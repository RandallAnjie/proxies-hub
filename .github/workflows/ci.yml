name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e . pytest
      - name: Run tests
        run: pytest -q
      - name: Build image (smoke)
        run: docker build -t proxyhub:ci .

  publish:
    needs: test
    runs-on: ubuntu-latest
    # never publish from forks / PRs; only on pushes to main or version tags
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      # stays green until you add the secrets, then starts pushing
      - name: Docker Hub credentials present?
        id: creds
        run: echo "ok=${{ secrets.DOCKERHUB_TOKEN != '' && secrets.DOCKERHUB_USERNAME != '' }}" >> "$GITHUB_OUTPUT"

      - name: Skip note
        if: steps.creds.outputs.ok != 'true'
        run: echo "::notice::DOCKERHUB_USERNAME / DOCKERHUB_TOKEN not set — skipping image publish."

      - uses: docker/setup-qemu-action@v3
        if: steps.creds.outputs.ok == 'true'
      - uses: docker/setup-buildx-action@v3
        if: steps.creds.outputs.ok == 'true'

      - uses: docker/login-action@v3
        if: steps.creds.outputs.ok == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Image tags
        id: meta
        if: steps.creds.outputs.ok == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/proxyhub
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build & push (amd64 + arm64)
        if: steps.creds.outputs.ok == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
